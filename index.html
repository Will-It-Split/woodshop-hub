<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Hub</title>

  <style>
/* Base styles */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  padding: 40px 20px;
}

header {
  padding: 20px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(5px);
}

nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 10px;
}

nav a {
  padding: 10px 20px;
  border: 2px solid #00ffff;
  border-radius: 8px;
  color: #00ffff;
  text-decoration: none;
  font-weight: bold;
  background: rgba(0, 0, 0, 0.4);
  box-shadow: 0 0 8px #00ffff;
  transition: 0.3s ease-in-out;
  cursor:pointer;
}

nav a:hover {
  background: #00ffff;
  color: black;
  box-shadow: 0 0 16px #00ffff, 0 0 32px #00ffff;
  transform: scale(1.05);
}

h1 {
  font-size: 42px;
  margin-top: 30px;
}

p {
  font-size: 18px;
  color: #ccc;
  max-width: 700px;
  margin: 20px auto;
}

.button {
  display: inline-block;
  margin: 15px 10px;
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 10px;
  color: #00ffff;
  background: rgba(0, 0, 0, 0.4);
  border: 2px solid #00ffff;
  text-decoration: none;
  box-shadow: 0 0 10px #00ffff, 0 0 25px #00ffff inset;
  transition: transform 0.3s, box-shadow 0.3s;
}

.button:hover {
  background: #00ffff;
  color: black;
  box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff inset;
  transform: scale(1.05);
}

.section { display:none; }
.section.show { display:block; }

.card {
  display:inline-block;
  margin:10px;
  padding:15px;
  border-radius:10px;
  border:2px solid #00ffff;
  box-shadow:0 0 10px #00ffff;
  background:rgba(0,0,0,0.4);
  min-width:220px;
}

.search {
  padding:10px;
  width:60%;
  max-width:400px;
  border:2px solid #00ffff;
  background:black;
  color:#00ffff;
  margin:20px;
}
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">

<header>
  <h1>Andrew Hub</h1>
  <p>Projects • Websites • Repos</p>

  <nav>
    <a onclick="show('home')">Home</a>
    <a onclick="show('web')">Websites</a>
    <a onclick="show('repos')">Repos</a>
    <a onclick="show('willit')">Will It Split</a>
  </nav>
</header>

<div id="home" class="section show">
  <div class="card">Welcome to Andrew's Hub</div>
</div>

<div id="web" class="section">
    <div class="button" onclick="window.open('https://will-it-split.github.io/will-it-split-v1/')">Play V1</div>
    <div class="button" onclick="window.open('https://will-it-split.github.io/Test-/')">Play Test</div>
    <div class="button" onclick="window.open('https://will-it-split.github.io/woodshop-hub/')">Vew Hub</div>
</div>

<div id="repos" class="section">
  <div class="button" onclick="window.open('https://github.com/Will-It-Split/will-it-split-v1')">Will It Split Current</div>
  <div class="button" onclick="window.open('https://github.com/Will-It-Split/Test-')">Test</div>
  <div class="button" onclick="window.open('https://github.com/Will-It-Split/woodshop-hub')">Woodshop Hub</div>
</div>

<div id="willit" class="section">
  <h2>Will It Split</h2>

  <div class="button" onclick="window.open('https://will-it-split.github.io/will-it-split-v1/')">Play V1</div>

  <div class="button" onclick="window.open('https://github.com/Will-It-Split/will-it-split-v1')">V1 Repo</div>

</div>

</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

function filter(q){
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q.toLowerCase()) ? 'inline-block':'none';
  });
}
</script>

</body>
</html>
